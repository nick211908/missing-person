server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service
    location /auth/ {
        proxy_pass http://backend:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /missing-persons {
        proxy_pass http://backend:8000/missing-persons;
        proxy_set_header Host $host;
    }

    location /process-frame {
        proxy_pass http://backend:8000/process-frame;
        proxy_set_header Host $host;
    }

    location /detections {
        proxy_pass http://backend:8000/detections;
        proxy_set_header Host $host;
    }

    # Serve images from the backend static mount
    location /images/ {
        proxy_pass http://backend:8000/images/;
        proxy_set_header Host $host;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
