services:
  # Backend Web Service
  - type: web
    name: face-detection-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    plan: standard # Recommended for Face Detection (min 512MB RAM)
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: face-detection-db
          property: connectionString
      - key: SIMILARITY_THRESHOLD
        value: 0.55

  # Frontend Static Site
  - type: web
    name: face-detection-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: face-detection-backend
          property: host

databases:
  - name: face-detection-db
    plan: free # Note: Free tier expires after 90 days.
